# Risk engine configuration. Every value is enforced by agent/risk/engine.py
# and every decision against these rules is logged to data/decisions.jsonl.
# Values are starting points to be calibrated before going live.

strategy:
  # Active signal plugin (agent/strategies/registry.py). "trend" is the default
  # and the validated one; "mean_reversion" is experimental (backtest first).
  # Override at runtime with --strategy NAME.
  # 2026-07-06: momentum ("navaja") -> trend. The navaja was an explicit
  # competition-window lottery (bounded-loss bet on a final-days move); the
  # competition is over and the head-to-head (scripts/trend_vs_momentum_bt.py)
  # shows trend bleeds 5-6x less after friction (720h/1%: -0.42% vs -1.95%,
  # 8 vs 56 trades). Sizing/cooldown below stay at the navaja-era values
  # (10%/1pos/6h) — that is the exact config the head-to-head measured; the
  # pre-navaja trend values (25%/2pos/24h, see comments below) are a separate
  # decision if the testbed should size up.
  active: trend

drawdown:                  # measured from high-water mark, hourly snapshots
  alert_pct: 10.0          # notify human
  pause_entries_pct: 15.0  # no new positions
  hard_stop_pct: 20.0      # flatten to stables (official DQ cap is ~30%)

position:
  # 2026-06-26: cut 25 -> 10 to BOUND THE NAVAJA (momentum lottery sleeve) to
  # <=10% of the book. With max_concurrent:1 below, at most one <=10% position is
  # ever open, so a full wipeout is ~-10% of portfolio (ladder alert, not DQ) and
  # 90%+ always sits in stables. Restore to 25 when reverting active off momentum.
  max_position_pct: 10.0   # max single position, % of portfolio value
  # 2026-06-26: 2 -> 1 so the navaja holds ONE position at a time (single bullet).
  max_concurrent: 1
  # Volatility-targeted sizing (#2, risk parity): scale a position DOWN when the
  # token's avg daily range exceeds the target, so each risks a similar budget.
  # Backtest: cuts max drawdown ~37% with equal/better return. 0 disables.
  vol_target_pct: 5.0
  vol_floor: 0.5           # never shrink a position below 50% of its base size

exits:
  # Hard stop-loss (#3): cut a position that falls this far from its entry — a
  # backstop below the EMA-loss signal exit, protecting the DQ gate against a
  # fast gap-down between cycles. 0 disables.
  stop_loss_pct: 8.0
  # Liquidity sentinel (#7, CMC DEX API): exit a held token whose reference
  # pool drains this far below its entry-time baseline (rug/LP-migration
  # protection — price signals lag this). Tokens whose deepest PancakeSwap v2
  # pool is under the min are "uncovered": the sentinel stays out of the way.
  liquidity_exit_drop_pct: 40.0   # 0 disables the sentinel
  liquidity_min_ref_usd: 100000

limits:
  # 2026-07-04 (user decision): daily cap REMOVED — 0 disables. Overtrading
  # stays bounded by max_concurrent:1, the re-entry cooldown, volume confirm
  # and per-token edge floors; each round trip risks ~0.05-0.1% of the book
  # in friction. Restore a positive value to re-enable.
  max_trades_per_day: 0
  max_slippage_pct: 1.0    # quote above this -> do not trade
  min_expected_edge_pct: 2.0  # entries must clear the cost floor with margin
  # Re-entry cooldown (#9): after closing a token, no re-entry for this many
  # hours. Kills the same-day whipsaw that pays double friction. Backtest:
  # +0.5pp return, win 29%->36%, in both windows tested. 0 disables.
  # 2026-06-26: 24 -> 6 for the navaja — a 24h lockout would allow ~1 entry per
  # token across the whole remaining window; 6h lets momentum re-engage while
  # still killing same-cycle whipsaw. Restore to 24 when reverting off momentum.
  reentry_cooldown_h: 6
  # Per-token edge floor (#9): an entry's expected edge must also clear the
  # token's own MEASURED round-trip friction (data/liquidity_report.json)
  # plus this margin — cheap tokens trade at 2%, expensive ones need more.
  # Backtest: +0.3pp / -13% maxDD on top of the cooldown. 0 disables.
  edge_floor_margin_pct: 0.5
  # Trade-budget reserve (#12): before this UTC hour, keep this many of the
  # daily trades unspent (only meaningful with a positive cap above). Moot
  # while the cap is disabled. "" or 0 disables.
  reserve_trades_until_utc: ""
  reserved_trades: 0

entry:
  # Volume confirmation (#11): an entry needs volume_24h >= ratio x its own
  # trailing-lookback-bar mean (attention rising, not fading). Backtest
  # (scripts/vol_filter_bt.py, 7d+20d): ratio 1.0 cut the worst gross-negative
  # entries and ~halved the fee-driven loss; 1.15x/1.3x overshoot. 0 disables.
  vol_confirm_ratio: 1.0
  vol_confirm_lookback: 24   # bars of trailing volume_24h to average against

compliance:
  # Competition is over: the >=1 trade/UTC-day qualification rule no longer
  # applies, so we no longer force a stable<->stable swap (it only paid friction
  # for zero edge). Empty deadline = forced daily trade DISABLED. Restore a
  # "HH:MM" value to re-enable.
  daily_trade_deadline_utc: ""       # was "20:00" — forced daily trade off post-competition
  min_portfolio_usd: 5.0             # stay far above the $1 zero-hour rule

data:
  max_signal_age_min: 10   # freshness gate: stale/failed data -> no new entries
  cycle_interval_s: 300
  regime_cache_min: 20

regime:
  # Asymmetric F&G gate (#4): extreme greed (>=80) blocks all entries; extreme
  # fear (<=20) allows entries at HALF scale and only above this conviction
  # floor. Calibrated 12 jun after a 12h dry-run spent entirely in extreme fear
  # (v1 blocked the whole window; see CHANGELOG).
  fear_conviction_floor: 0.50
