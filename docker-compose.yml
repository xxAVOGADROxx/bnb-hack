services:
  agent:
    build: .
    container_name: bnb-hack-agent
    restart: unless-stopped
    # Let an in-flight swap finish before docker SIGKILLs on `docker stop`.
    stop_grace_period: 90s
    env_file: .env
    environment:
      # Execution backend: route quote/swap DIRECTLY through PancakeSwap V3
      # instead of TWAK's 0x/LiquidMesh aggregation. Verified on-chain +
      # $2 self-test 2026-07-02: round-trip drops from ~1.7% (aggregator markup)
      # to ~0.02-0.9% (LP fee only). Balances/compete/x402 still go via TWAK.
      # Unset to revert to TWAK. See agent/execution/pancake.py.
      EXEC_BACKEND: "pancake"
      # Trading-week pre-step: re-measure round-trip friction at the live
      # fee-waiver pricing before the loop starts (see deploy/entrypoint.sh).
      # FILTER_SIZE_USD is ONLY the notional used to MEASURE round-trip cost at
      # container start — NOT the capital. Real position sizing is %-based off
      # the live wallet balance (config/risk.yaml: max_position_pct). Because
      # this runs at CONTAINER START, bring the stack up DURING the window
      # (on/after Jun 22) so the measurement lands at waiver pricing.
      REFRESH_FILTER_ON_START: "1"
      FILTER_SIZE_USD: "250"
      # Cap watchlist inclusion at this round-trip cost. The 0.077%/leg fee
      # waiver Gwen announced does NOT show in twak quotes (verified Jun 22:
      # competition-week round-trips still measure ~1.3% with price_impact 0 =
      # pure standard fee). At a 0.3% ceiling that admits ZERO tokens all week
      # -> the agent freezes flat. Set to 1.5% to admit the ~5-6 most liquid
      # names (ETH 1.30, ZEC 1.34, CAKE 1.34, DOGE 1.36, XRP 1.40). The 2%
      # min-edge floor + 8% stop + 20% drawdown guard still gate actual trades,
      # so this widens *eligibility*, not risk. Dial up for more breadth.
      # 2026-06-26: 1.5 -> 2.0 for the NAVAJA (momentum sleeve). The 1.5 ceiling
      # excluded big movers like AAVE (1.81% friction) that ran +32% in 3 days —
      # for a momentum lottery, 1.8% friction is noise vs the move we hunt. 2.0
      # admits AAVE + liquid majors (LINK/UNI/LTC/ADA/BCH...). Restore to 1.5
      # when reverting off momentum. The navaja's breakout+RSI gates still decide.
      WATCHLIST_MAX_COST_PCT: "2.0"
      # Self-correcting waiver capture: re-measure friction every N hours; on a
      # material drop (fee waiver went live) the agent exits and this service's
      # restart policy relaunches -> entrypoint re-measures + reloads the full
      # universe. Makes the start hour irrelevant. 0/unset disables.
      FLOOR_REFRESH_H: "6"
    volumes:
      # TWAK credentials + encrypted keystore (created by `twak wallet create`
      # on the host). Signing stays local — nothing leaves the box.
      - ${HOME}/.twak:/root/.twak
      # Persistent state: decision log, snapshots, id map, HWM.
      - ./data:/app/data
      # Private watchlist (gitignored). Writable: the on-start filter pre-step
      # regenerates it from the fresh round-trip measurement.
      - ./config/watchlist.local.yaml:/app/config/watchlist.local.yaml
    # LIVE, open-ended. 2026-07-08: competition window flags REMOVED — the
    # bot is a post-competition testbed now, so no --start-at/--stop-at; it
    # runs until `docker compose down` (the restart policy keeps it alive
    # through crashes, and the entrypoint re-measures friction on each start).
    # All times UTC; reports land in data/reports/ + Telegram every 12h.
    command: ["--live", "--report-every-min", "720"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
