services:
  agent:
    build: .
    container_name: bnb-hack-agent
    restart: unless-stopped
    # Let an in-flight swap finish before docker SIGKILLs on `docker stop`.
    stop_grace_period: 90s
    env_file: .env
    volumes:
      # TWAK credentials + encrypted keystore (created by `twak wallet create`
      # on the host). Signing stays local — nothing leaves the box.
      - ${HOME}/.twak:/root/.twak
      # Persistent state: decision log, snapshots, id map, HWM.
      - ./data:/app/data
      # Private watchlist (gitignored) — copy it to the server first.
      - ./config/watchlist.local.yaml:/app/config/watchlist.local.yaml:ro
    # DRY-RUN by default. For the COMPETITION WEEK uncomment the scheduled
    # command below and `docker compose up -d`: the service form keeps the
    # restart watchdog (`docker compose run` containers do NOT auto-restart),
    # and on a crash-restart the agent re-reads the window bounds — it waits
    # again if early, trades if inside, stops cleanly if past the end.
    # All times UTC; reports land in data/reports/ + Telegram every 12h.
    # command: ["--live",
    #           "--start-at", "2026-06-22T00:00Z",
    #           "--stop-at",  "2026-06-28T23:59Z",
    #           "--report-every-min", "720"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
