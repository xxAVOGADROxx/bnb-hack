services:
  agent:
    build: .
    container_name: bnb-hack-agent
    restart: unless-stopped
    # Let an in-flight swap finish before docker SIGKILLs on `docker stop`.
    stop_grace_period: 90s
    env_file: .env
    volumes:
      # TWAK credentials + encrypted keystore (created by `twak wallet create`
      # on the host). Signing stays local — nothing leaves the box.
      - ${HOME}/.twak:/root/.twak
      # Persistent state: decision log, snapshots, id map, HWM.
      - ./data:/app/data
      # Private watchlist (gitignored) — copy it to the server first.
      - ./config/watchlist.local.yaml:/app/config/watchlist.local.yaml:ro
    # DRY-RUN by default. Uncomment for the live trading window (22-28 jun):
    # command: ["--live"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
